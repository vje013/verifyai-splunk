<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cmTitle cmDesc">
<title id="cmTitle">Adversarial probe to compliance control to Splunk metric</title>
