<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="msTitle msDesc">
<title id="msTitle">VerifyAI Splunk metric schema</title>
<desc id="msDesc">Eight verifyai metrics, gauges and counters, with five shared dimensions, that land in Splunk Observability Cloud.</desc>
<defs>
  <marker id="arrSchema" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t-title { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; }
    .t-sub { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; }
    .t-mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 400; }
    .t-mono-em { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 11px; font-weight: 500; }
    .t-label { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; }
    .t-pill { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 500; }
  </style>
</defs>

<!-- Determinism metrics block -->
<rect x="20" y="20" width="320" height="190" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="40" y="46" dominant-baseline="central" fill="#04342C">Determinism metrics</text>
<rect x="240" y="34" width="80" height="22" rx="11" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-pill" x="280" y="48" text-anchor="middle" dominant-baseline="central" fill="#04342C">GAUGE 0..1</text>

<text class="t-mono-em" x="40" y="80" fill="#04342C">verifyai.determinism.score</text>
<text class="t-sub" x="40" y="98" fill="#0F6E56">weighted overall, 0..1</text>

<text class="t-mono" x="40" y="124" fill="#085041">verifyai.determinism.output_equivalence</text>
<text class="t-mono" x="40" y="146" fill="#085041">verifyai.determinism.semantic_equivalence</text>
<text class="t-mono" x="40" y="168" fill="#085041">verifyai.determinism.decision_stability</text>

<text class="t-sub" x="40" y="192" fill="#0F6E56">written by run_determinism, replay_to_splunk</text>

<!-- Adversarial metrics block -->
<rect x="350" y="20" width="310" height="190" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="370" y="46" dominant-baseline="central" fill="#04342C">Adversarial metrics</text>
<rect x="540" y="34" width="110" height="22" rx="11" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-pill" x="595" y="48" text-anchor="middle" dominant-baseline="central" fill="#04342C">GAUGE + COUNTER</text>

<text class="t-mono-em" x="370" y="80" fill="#04342C">verifyai.adversarial.pass_rate</text>
<text class="t-sub" x="370" y="98" fill="#0F6E56">gauge, blocked / total</text>

<text class="t-mono" x="370" y="124" fill="#085041">verifyai.adversarial.probe_count</text>
<text class="t-mono" x="370" y="146" fill="#085041">verifyai.adversarial.blocked_count</text>
<text class="t-mono" x="370" y="168" fill="#085041">verifyai.adversarial.leaked_count</text>

<text class="t-sub" x="370" y="192" fill="#0F6E56">written by run_deepteam</text>

<!-- Convergence arrows -->
<line x1="180" y1="220" x2="180" y2="252" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrSchema)"/>
<line x1="500" y1="220" x2="500" y2="252" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrSchema)"/>

<!-- Shared dimensions block -->
<rect x="20" y="254" width="640" height="170" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="40" y="280" dominant-baseline="central" fill="#042C53">Shared dimensions, 5 per data point</text>

<rect x="40" y="298" width="180" height="40" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-label" x="50" y="316" fill="#042C53">account</text>
<text class="t-mono" x="50" y="332" fill="#0C447C">echelor-design-partner-01</text>

<rect x="232" y="298" width="180" height="40" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-label" x="242" y="316" fill="#042C53">workflow</text>
<text class="t-mono" x="242" y="332" fill="#0C447C">echelor-ai-chat</text>

<rect x="424" y="298" width="216" height="40" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-label" x="434" y="316" fill="#042C53">framework</text>
<text class="t-mono" x="434" y="332" fill="#0C447C">GLBA_Safeguards_Rule</text>

<rect x="40" y="350" width="180" height="40" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-label" x="50" y="368" fill="#042C53">service</text>
<text class="t-mono" x="50" y="384" fill="#0C447C">verifyai</text>

<rect x="232" y="350" width="408" height="40" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-label" x="242" y="368" fill="#042C53">source</text>
<text class="t-mono" x="242" y="384" fill="#0C447C">replay | sweep | adversarial</text>

<text class="t-sub" x="40" y="412" fill="#0C447C">cardinality bound by (accounts) x (workflows) x (frameworks). Per-metric, currently tens of time series.</text>

<!-- Splunk destination -->
<rect x="120" y="446" width="440" height="74" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="340" y="468" text-anchor="middle" dominant-baseline="central" fill="#042C53">Splunk Observability Cloud, us1 realm</text>
<text class="t-sub" x="340" y="488" text-anchor="middle" dominant-baseline="central" fill="#0C447C">ingest.us1.signalfx.com / v2 / datapoint</text>
<text class="t-mono" x="340" y="506" text-anchor="middle" dominant-baseline="central" fill="#0C447C">POST {"gauge": [...], "counter": [...]} with X-SF-TOKEN</text>

<line x1="340" y1="424" x2="340" y2="442" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrSchema)"/>
</svg>
