<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">VerifyAI x Splunk Agentic Ops architecture</title>
<desc id="desc">VerifyAI MCP server acts as both a Modal client (writing telemetry) and a Splunk MCP Gateway client (reading telemetry), converging at Splunk Observability Cloud.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <style>
    .t-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; }
    .t-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; }
    .t-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  </style>
</defs>

<rect x="220" y="20" width="240" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-title" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#26215C">Consumer</text>
<text class="t-sub" x="340" y="58" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Claude Desktop, MCP Inspector</text>

<line x1="340" y1="68" x2="340" y2="98" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="t-label" x="350" y="86" dominant-baseline="central">MCP stdio</text>

<rect x="100" y="100" width="480" height="74" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="340" y="123" text-anchor="middle" dominant-baseline="central" fill="#04342C">VerifyAI MCP server</text>
<text class="t-sub" x="340" y="143" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">8 tools: posture, drift, sweep, certificate, adversarial sweep</text>
<text class="t-sub" x="340" y="161" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Composes Modal writer with Splunk MCP Gateway reader</text>

<line x1="220" y1="174" x2="180" y2="216" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="t-label" x="120" y="200" dominant-baseline="central">HTTPS, SSE</text>

<line x1="460" y1="174" x2="500" y2="216" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="t-label" x="500" y="200" dominant-baseline="central">MCP streamable HTTP</text>

<rect x="40" y="218" width="280" height="120" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="180" y="242" text-anchor="middle" dominant-baseline="central" fill="#04342C">VerifyAI backend on Modal</text>
<text class="t-sub" x="180" y="264" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">run_determinism: 4 dimensions per sweep</text>
<text class="t-sub" x="180" y="284" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">run_deepteam: adversarial probes, framework-mapped</text>
<text class="t-sub" x="180" y="306" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">DeepTeam v0.2.7, OpenRouter target</text>
<text class="t-sub" x="180" y="324" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Ledger volume, certificate signing</text>

<rect x="360" y="218" width="280" height="120" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="500" y="242" text-anchor="middle" dominant-baseline="central" fill="#042C53">Splunk MCP Gateway</text>
<text class="t-sub" x="500" y="264" text-anchor="middle" dominant-baseline="central" fill="#0C447C">12 o11y tools discovered live</text>
<text class="t-sub" x="500" y="284" text-anchor="middle" dominant-baseline="central" fill="#0C447C">o11y_execute_signalflow_program</text>
<text class="t-sub" x="500" y="306" text-anchor="middle" dominant-baseline="central" fill="#0C447C">o11y_search_alerts_or_incidents</text>
<text class="t-sub" x="500" y="324" text-anchor="middle" dominant-baseline="central" fill="#0C447C">o11y_get_metric_metadata, plus 9 more</text>

<line x1="180" y1="338" x2="280" y2="396" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="t-label" x="120" y="372" dominant-baseline="central">OTel push: verifyai.*</text>

<line x1="500" y1="338" x2="400" y2="396" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="t-label" x="500" y="372" dominant-baseline="central">SignalFlow queries</text>

<rect x="80" y="398" width="520" height="120" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="340" y="422" text-anchor="middle" dominant-baseline="central" fill="#042C53">Splunk Observability Cloud, free edition</text>
<text class="t-sub" x="340" y="444" text-anchor="middle" dominant-baseline="central" fill="#0C447C">verifyai.determinism.score, output_equivalence, decision_stability</text>
<text class="t-sub" x="340" y="464" text-anchor="middle" dominant-baseline="central" fill="#0C447C">verifyai.adversarial.pass_rate, blocked_count, leaked_count</text>
<text class="t-sub" x="340" y="484" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Dimensions: account, workflow, framework, source</text>
<text class="t-sub" x="340" y="504" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Dashboard: agent determinism posture, 5 panels</text>
</svg>
